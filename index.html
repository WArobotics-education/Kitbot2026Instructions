<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WA Robotics Education Kit Build</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <header class="site-header">
      <p class="brand">warobotics.education</p>
      <div class="site-header-row">
        <h1>Robot Kit Build</h1>
        <nav class="site-nav" aria-label="Site navigation">
          <a class="nav-button" href="cut-list.html">Material cut list</a>
        </nav>
      </div>
    </header>

    <main class="viewer" aria-live="polite">
      <p id="status" class="status">Loading instructions…</p>

      <section id="step-view" class="step-view" hidden>
        <div class="progress-row">
          <span id="progress-text">Step 1 of 1</span>
          <div class="progress-track">
            <div
              id="progress-bar"
              class="progress-bar"
              role="progressbar"
              aria-label="Build progress"
              aria-valuenow="0"
              aria-valuemin="0"
              aria-valuemax="100"
            ></div>
          </div>
        </div>

        <figure class="step-media">
          <img id="step-image" alt="">
          <figcaption id="image-fallback" class="image-fallback" hidden></figcaption>
        </figure>

        <div class="step-copy">
          <h2 id="step-title"></h2>
          <p id="step-description"></p>
        </div>

        <nav class="controls" aria-label="Step navigation">
          <button id="back-button" type="button">Back</button>
          <button id="next-button" type="button" class="primary">Next</button>
        </nav>
      </section>
    </main>
  </body>
</html>
